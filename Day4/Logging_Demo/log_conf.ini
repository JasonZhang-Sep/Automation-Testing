[loggers]   # 定义日志器列表
keys = root

[handlers]  #定义处理器列表
keys = fileHandler,streamHandler

[formatters]    #定义格式化器列表
keys = simpleFormatter

[logger_root]   #配置root日志器
level = DEBUG
handlers = fileHandler,streamHandler

[handler_fileHandler]  #配置文件处理器
class = FileHandler
level = DEBUG
formatter = simpleFormatter
args = ('./log_conf.log','a','utf-8')

[handler_streamHandler] #配置控制台处理器
class = StreamHandler
level = DEBUG
formatter = simpleFormatter

[formatter_simpleFormatter] #配置格式化器
format = %(levelname)s %(asctime)s %(filename)s %(module)s %(funcName)s %(lineno)s : %(message)s